# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - VoiceLauncherBlazor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build VoiceAdmin/VoiceAdmin.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish VoiceAdmin/VoiceAdmin.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Zip artifact for deployment
        run: Compress-Archive -Path "${{env.DOTNET_ROOT}}/myapp/*" -DestinationPath release.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: release.zip

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_171C5676CA854064AD7AFB6C967A7BCD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_00E12376091B4FEABE686B2B6A18A59E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99B3D8903FC946A287C78855EAE306D4 }}

      - name: Deploy ZIP via Kudu
        shell: pwsh
        run: |
          if (-not (Test-Path "release.zip")) {
            Write-Host "release.zip not found in working directory. Listing files for diagnostics..."
            Get-ChildItem -Recurse | Select-Object -First 200
            throw "release.zip not found"
          }

          $resourceGroup = az webapp list --query "[?name=='VoiceLauncherBlazor'].resourceGroup | [0]" -o tsv
          if (-not $resourceGroup) {
            throw "Could not resolve resource group for app VoiceLauncherBlazor"
          }

          Write-Host "Deploying release.zip to app VoiceLauncherBlazor in resource group $resourceGroup"
          az webapp deployment source config-zip --resource-group $resourceGroup --name VoiceLauncherBlazor --src release.zip
          